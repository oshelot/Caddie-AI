<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaddieAI — Geometry Corrections Review</title>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
  .header { background: #1a1a2e; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .count { background: #e74c3c; color: white; border-radius: 12px; padding: 2px 10px; font-size: 13px; }
  .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }
  .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; overflow: hidden; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid #eee; }
  .card-header h2 { font-size: 16px; margin-bottom: 4px; }
  .card-header .meta { font-size: 13px; color: #666; }
  .map-container { height: 400px; width: 100%; }
  .card-actions { padding: 12px 20px; display: flex; gap: 12px; justify-content: flex-end; border-top: 1px solid #eee; }
  .btn { padding: 8px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-approve { background: #27ae60; color: white; }
  .btn-deny { background: #e74c3c; color: white; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .empty { text-align: center; padding: 60px 20px; color: #999; }
  .empty h2 { font-size: 20px; margin-bottom: 8px; color: #666; }
  .legend { display: flex; gap: 16px; padding: 8px 20px; font-size: 12px; color: #666; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend .dot { width: 12px; height: 3px; border-radius: 2px; }
  .dot-original { background: #e74c3c; }
  .dot-corrected { background: #27ae60; }
  .dot-tee { background: #3498db; width: 8px; height: 8px; border-radius: 50%; }
  .dot-green { background: #2ecc71; width: 8px; height: 8px; border-radius: 50%; }
  .setup { text-align: center; padding: 40px; }
  .setup input { padding: 8px 16px; border: 1px solid #ccc; border-radius: 8px; width: 400px; font-size: 14px; }
  .setup button { margin-top: 12px; padding: 8px 24px; background: #1a1a2e; color: white; border: none; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <h1>CaddieAI Geometry Corrections</h1>
  <span class="count" id="pending-count">0 pending</span>
</div>

<div class="container" id="app">
  <div class="setup" id="setup-panel">
    <p style="margin-bottom: 12px; color: #666;">Enter credentials to load pending corrections:</p>
    <input type="password" id="api-key-input" placeholder="x-api-key" value="" style="margin-bottom: 8px;">
    <br>
    <input type="text" id="mapbox-token-input" placeholder="Mapbox token (pk.ey...)" value="">
    <br>
    <button onclick="startReview()">Load Corrections</button>
  </div>
</div>

<script>
const API_BASE = 'https://88khjbfbwk.execute-api.us-east-2.amazonaws.com/prod';
// Mapbox token is loaded from localStorage to avoid committing secrets.
// Set it once via the browser console: localStorage.setItem('mapbox-token', 'pk.ey...')
const MAPBOX_TOKEN = localStorage.getItem('mapbox-token') || '';
mapboxgl.accessToken = MAPBOX_TOKEN;

let apiKey = localStorage.getItem('caddieai-api-key') || '';
let corrections = [];

if (apiKey) {
  document.getElementById('api-key-input').value = apiKey;
}
if (MAPBOX_TOKEN) {
  document.getElementById('mapbox-token-input').value = MAPBOX_TOKEN;
}

async function startReview() {
  apiKey = document.getElementById('api-key-input').value.trim();
  if (!apiKey) return alert('Enter an API key');
  localStorage.setItem('caddieai-api-key', apiKey);

  const mbToken = document.getElementById('mapbox-token-input').value.trim();
  if (mbToken) {
    localStorage.setItem('mapbox-token', mbToken);
    mapboxgl.accessToken = mbToken;
  }
  if (!mapboxgl.accessToken) return alert('Enter a Mapbox token');

  await loadCorrections();
}

async function loadCorrections() {
  const setup = document.getElementById('setup-panel');
  if (setup) setup.remove();

  try {
    const resp = await fetch(`${API_BASE}/corrections?status=pending`, {
      headers: { 'x-api-key': apiKey },
    });
    const data = await resp.json();
    corrections = data.corrections || [];
  } catch (e) {
    corrections = [];
    console.error('Failed to load corrections:', e);
  }

  document.getElementById('pending-count').textContent = `${corrections.length} pending`;
  renderCorrections();
}

function renderCorrections() {
  const container = document.getElementById('app');
  container.innerHTML = '';

  if (corrections.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <h2>No pending corrections</h2>
        <p>All geometry corrections have been reviewed.</p>
      </div>`;
    return;
  }

  corrections.forEach((c, idx) => {
    const cardId = `card-${idx}`;
    const mapId = `map-${idx}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.id = cardId;

    const yardInfo = c.expectedYards ? `${c.expectedYards}y expected, ${c.measuredYards || '?'}y measured` : '';
    card.innerHTML = `
      <div class="card-header">
        <h2>${c.facilityName} — ${c.courseName} Hole ${c.holeNumber}</h2>
        <div class="meta">Par ${c.par || '?'} &bull; ${yardInfo} &bull; ${c.submittedAt || ''}</div>
      </div>
      <div class="legend">
        <span><span class="dot dot-original"></span> Original OSM</span>
        <span><span class="dot dot-corrected"></span> Corrected</span>
        <span><span class="dot dot-tee"></span> Tee</span>
        <span><span class="dot dot-green"></span> Green</span>
      </div>
      <div class="map-container" id="${mapId}"></div>
      <div class="card-actions">
        <button class="btn btn-deny" onclick="reviewCorrection('${c.id}', 'denied', '${cardId}')">Deny</button>
        <button class="btn btn-approve" onclick="reviewCorrection('${c.id}', 'approved', '${cardId}')">Approve</button>
      </div>`;

    container.appendChild(card);

    // Initialize map after DOM insertion
    setTimeout(() => initMap(mapId, c), 100);
  });
}

function initMap(mapId, correction) {
  const tee = correction.teeCentroid || [0, 0];
  const green = correction.greenCentroid || [0, 0];
  const center = [(tee[0] + green[0]) / 2, (tee[1] + green[1]) / 2];

  const map = new mapboxgl.Map({
    container: mapId,
    style: 'mapbox://styles/mapbox/satellite-streets-v12',
    center: center,
    zoom: 16.5,
  });

  map.on('load', () => {
    // Original line (red, dashed)
    const origCoords = correction.original?.lineOfPlay;
    if (origCoords && origCoords.length >= 2) {
      map.addSource('original', {
        type: 'geojson',
        data: { type: 'Feature', geometry: { type: 'LineString', coordinates: origCoords } },
      });
      map.addLayer({
        id: 'original-line', type: 'line', source: 'original',
        paint: { 'line-color': '#e74c3c', 'line-width': 3, 'line-dasharray': [2, 2] },
      });
    }

    // Corrected line (green, solid)
    const corrCoords = correction.corrected?.lineOfPlay;
    if (corrCoords && corrCoords.length >= 2) {
      map.addSource('corrected', {
        type: 'geojson',
        data: { type: 'Feature', geometry: { type: 'LineString', coordinates: corrCoords } },
      });
      map.addLayer({
        id: 'corrected-line', type: 'line', source: 'corrected',
        paint: { 'line-color': '#27ae60', 'line-width': 3 },
      });
    }

    // Tee marker
    if (tee[0] !== 0) {
      new mapboxgl.Marker({ color: '#3498db' }).setLngLat(tee).addTo(map);
    }
    // Green marker
    if (green[0] !== 0) {
      new mapboxgl.Marker({ color: '#2ecc71' }).setLngLat(green).addTo(map);
    }

    // Fit bounds to show both lines
    const allCoords = [...(origCoords || []), ...(corrCoords || [])];
    if (allCoords.length >= 2) {
      const bounds = allCoords.reduce(
        (b, c) => b.extend(c),
        new mapboxgl.LngLatBounds(allCoords[0], allCoords[0])
      );
      map.fitBounds(bounds, { padding: 80 });
    }
  });
}

async function reviewCorrection(id, decision, cardId) {
  const card = document.getElementById(cardId);
  const buttons = card.querySelectorAll('.btn');
  buttons.forEach(b => b.disabled = true);

  try {
    await fetch(`${API_BASE}/corrections/review`, {
      method: 'POST',
      headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, decision }),
    });

    card.style.transition = 'opacity 0.3s, transform 0.3s';
    card.style.opacity = '0';
    card.style.transform = 'translateX(100px)';
    setTimeout(() => {
      card.remove();
      corrections = corrections.filter(c => c.id !== id);
      document.getElementById('pending-count').textContent = `${corrections.length} pending`;
      if (corrections.length === 0) renderCorrections();
    }, 300);
  } catch (e) {
    console.error('Review failed:', e);
    buttons.forEach(b => b.disabled = false);
  }
}
</script>
</body>
</html>
