AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  CaddieAI LLM Proxy — FastAPI on Lambda with response streaming via
  Lambda Web Adapter. Routes chat completions through Amazon Bedrock
  (Nova Micro) with SSE streaming support for paid-tier mobile clients.
  Includes shadow evaluation for LLM quality comparison.

Globals:
  Function:
    Timeout: 90
    MemorySize: 512

Parameters:
  ProxyApiKey:
    Type: String
    Description: API key that mobile clients must send in x-api-key header
    NoEcho: true
  BedrockModelId:
    Type: String
    Default: us.amazon.nova-micro-v1:0
    Description: Bedrock model ID for chat completions
  ShadowModels:
    Type: String
    Default: '{"nova-lite":{"model_id":"us.amazon.nova-lite-v1:0","provider":"bedrock"}}'
    Description: JSON string of shadow model registry
  ShadowSampleRate:
    Type: String
    Default: "1.0"
    Description: Probability of running shadow evaluation (0.0-1.0)

Resources:
  EvalTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: caddieai-llm-eval
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: request_id
          AttributeType: S
        - AttributeName: model_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: role
          AttributeType: S
      KeySchema:
        - AttributeName: request_id
          KeyType: HASH
        - AttributeName: model_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: model-timestamp-index
          KeySchema:
            - AttributeName: model_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: role-timestamp-index
          KeySchema:
            - AttributeName: role
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  LLMProxyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: caddieai-llm-proxy
      Runtime: python3.12
      Handler: run.sh
      CodeUri: .
      Architectures:
        - x86_64
      Layers:
        # Lambda Web Adapter layer — routes HTTP to the FastAPI app
        - !Sub arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8000"
          PROXY_API_KEY: !Ref ProxyApiKey
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          SHADOW_MODELS: !Ref ShadowModels
          SHADOW_SAMPLE_RATE: !Ref ShadowSampleRate
          EVAL_TABLE_NAME: !Ref EvalTable
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - !Sub arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*
                - arn:aws:bedrock:*::foundation-model/*
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:BatchWriteItem
              Resource:
                - !GetAtt EvalTable.Arn
                - !Sub ${EvalTable.Arn}/index/*
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: "*"
              Condition:
                StringEquals:
                  cloudwatch:namespace: CaddieAI/LLMEval
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - POST
          AllowHeaders:
            - Content-Type
            - x-api-key

Outputs:
  FunctionUrl:
    Description: Lambda Function URL (use this as the proxy endpoint in client apps)
    Value: !GetAtt LLMProxyFunctionUrl.FunctionUrl
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt LLMProxyFunction.Arn
  EvalTableName:
    Description: DynamoDB table for shadow evaluation results
    Value: !Ref EvalTable
