plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.caddieai.mobile"
    // Pinned per spike findings (SPIKE_REPORT §4 / KAN-252) and the
    // 2026-04-11 toolchain refresh (AGP 8.7 + Kotlin 2.1 + Gradle 8.9):
    // - compileSdk 35 required by flutter_plugin_android_lifecycle
    // - NDK 27.0 requested by mapbox_maps_flutter on the current toolchain
    //   (was 26.1 on the older spike toolchain)
    compileSdk = 35
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.caddieai.mobile"
        // Matches the existing native Android app's minSdk and is the
        // floor required by mapbox_maps_flutter 2.x.
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
