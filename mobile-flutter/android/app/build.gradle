plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// ── KAN-296 / KAN-251: dart-defines from local.properties ─────────────────
//
// Reads `mobile-flutter/android/local.properties` and forwards every known
// secret as a Flutter `--dart-define` so the Dart side's
// `String.fromEnvironment(KEY)` calls actually resolve. Without this, IDE
// "Run" launches (which don't pass --dart-define on the command line) end
// up with empty endpoints and the course-search/places/LLM clients all
// silently short-circuit.
//
// **How it talks to the Flutter Gradle Plugin:** the plugin reads
// `project.findProperty("dart-defines")` (FlutterPlugin.kt:597) and
// forwards the value to the Dart toolchain as `--DartDefines=<value>`.
// The expected wire format is comma-separated, where each `KEY=VALUE`
// pair is UTF-8 → base64-encoded individually
// (build_info.dart:1081 `_defineEncoder = utf8.encoder.fuse(base64.encoder)`).
//
// **Precedence:** if the user passes `flutter run --dart-define=K=V` from
// the CLI, gradle is invoked with `-Pdart-defines=...` and we leave that
// alone. The injection only fires when the property is unset (the IDE-run
// path). Tests are unaffected — they read constants from
// `String.fromEnvironment(..., defaultValue: '')` and inject fakes.
def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader -> localProperties.load(reader) }
}

// The Flutter CLI invokes gradle with `-Pdart-defines=` (empty string,
// NOT absent) when the user doesn't pass --dart-define flags. So we
// must check for null OR empty, not just null.
def existingDartDefines = project.findProperty("dart-defines")?.toString() ?: ""
if (existingDartDefines.isEmpty()) {
    def secretKeys = [
        "COURSE_CACHE_ENDPOINT",
        "COURSE_CACHE_API_KEY",
        "MAPBOX_TOKEN",
        "LLM_PROXY_ENDPOINT",
        "LLM_PROXY_API_KEY",
        "LOGGING_ENDPOINT",
        "LOGGING_API_KEY",
        "GOLF_COURSE_API_KEY",
        "SUBSCRIPTION_PRODUCT_ID",
        "APP_VERSION",
        "BUILD_NUMBER",
    ]
    def encodedDefines = []
    secretKeys.each { key ->
        def value = localProperties.getProperty(key)
        if (value != null && !value.isEmpty()) {
            encodedDefines.add("${key}=${value}".bytes.encodeBase64().toString())
        }
    }
    if (!encodedDefines.isEmpty()) {
        project.ext.set("dart-defines", encodedDefines.join(","))
    }
}

android {
    namespace = "com.caddieai.mobile"
    // Pinned per spike findings (SPIKE_REPORT §4 / KAN-252) and the
    // 2026-04-11 toolchain refresh (AGP 8.7 + Kotlin 2.1 + Gradle 8.9):
    // - compileSdk 35 required by flutter_plugin_android_lifecycle
    // - NDK 27.0 requested by mapbox_maps_flutter on the current toolchain
    //   (was 26.1 on the older spike toolchain)
    compileSdk = 35
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.caddieai.mobile"
        // Matches the existing native Android app's minSdk and is the
        // floor required by mapbox_maps_flutter 2.x.
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
