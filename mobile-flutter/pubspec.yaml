name: caddieai
description: "CaddieAI mobile — Flutter unified codebase (KAN-251 migration)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # PINNED to match the version validated by the KAN-252 spike.
  # Do NOT bump without re-running the spike's scripted interaction on
  # both platforms — mapbox_maps_flutter has iOS-side layer-add
  # regressions at several point releases (see SPIKE_REPORT §4).
  mapbox_maps_flutter: 2.12.0

  # Renders the CaddieAI custom icon set. Picked over an icon font
  # (rejected ADR 0006) because the source SVGs are stroke-based line
  # drawings (`fill: none; stroke: #000;`), which TTF glyphs cannot
  # represent. See ADR 0007 for the full rationale.
  flutter_svg: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # CaddieAI custom icon set — 45 stroke-based SVGs from
  # /home/apatel/Caddie-AI-Iconagraphy/caddieai-icons/. Rendered via
  # flutter_svg (see ADR 0007). All UI code references icons via the
  # named getters in `lib/core/icons/caddie_icons.dart`
  # (CONVENTIONS C-6). The SVGs ARE the runtime artifact — there is
  # no font generation step.
  assets:
    - assets/icons/
