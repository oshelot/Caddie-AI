name: caddieai
description: "CaddieAI mobile — Flutter unified codebase (KAN-251 migration)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # PINNED to match the version validated by the KAN-252 spike.
  # Do NOT bump without re-running the spike's scripted interaction on
  # both platforms — mapbox_maps_flutter has iOS-side layer-add
  # regressions at several point releases (see SPIKE_REPORT §4).
  mapbox_maps_flutter: 2.12.0

  # Renders the CaddieAI custom icon set. Picked over an icon font
  # (rejected ADR 0006) because the source SVGs are stroke-based line
  # drawings (`fill: none; stroke: #000;`), which TTF glyphs cannot
  # represent. See ADR 0007 for the full rationale.
  flutter_svg: ^2.0.0
  go_router: ^17.2.0

  # KAN-272 (S2) — local storage stack. Per ADR 0004, hive_ce is the
  # structured store and flutter_secure_storage holds API keys. We
  # deliberately do NOT pull in hive_ce_generator / freezed / build_runner
  # for this story — ADR 0004 §"freezed compatibility" explicitly allows
  # hand-written toJson/fromJson, and avoiding the codegen step keeps the
  # storage layer cheap to iterate. If a later story needs union types or
  # value-equality codegen, lift in freezed at that point.
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.0.0
  path_provider: ^2.1.0
  flutter_secure_storage: ^9.2.0

  # KAN-274 (S4) — location + permissions foundation. We deliberately
  # split the responsibilities: `geolocator` for "where am I + heading"
  # and `permission_handler` for "did the user grant location access".
  # Both plugins ship their own permission flow, but `permission_handler`
  # has the better cross-platform model (one Permission enum, one
  # request flow, one settings deep-link) so we use it as the
  # authoritative source for permission state. `geolocator` only
  # consumes already-granted permissions.
  geolocator: ^13.0.0
  permission_handler: ^11.3.0

  # KAN-278 (S8) — speech I/O. `speech_to_text` wraps the platform
  # native speech recognizers (SFSpeechRecognizer on iOS, the
  # SpeechRecognizer system service on Android). `flutter_tts` wraps
  # the platform TTS engines (AVSpeechSynthesizer on iOS, the
  # android.speech.tts.TextToSpeech engine on Android). Both plugins
  # surface partial results / progress callbacks via stream-like
  # APIs, which is what the caddie screen (KAN-S11) needs to render
  # token-by-token transcription.
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # CaddieAI custom icon set — 45 stroke-based SVGs from
  # /home/apatel/Caddie-AI-Iconagraphy/caddieai-icons/. Rendered via
  # flutter_svg (see ADR 0007). All UI code references icons via the
  # named getters in `lib/core/icons/caddie_icons.dart`
  # (CONVENTIONS C-6). The SVGs ARE the runtime artifact — there is
  # no font generation step.
  assets:
    - assets/icons/
    # KAN-280 (S10) — fallback course fixture for the Course tab
    # while the real S5 cache integration is wired in. Lifted from
    # the KAN-252 spike (`flutter-spike/assets/fixtures/sharp_park.json`).
    # Once KAN-S10's first version of the screen ships, this fixture
    # is the offline-development course; production builds fetch
    # from `CourseCacheClient` and never load this asset.
    - assets/fixtures/
