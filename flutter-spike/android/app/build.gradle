plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.caddieai.spike.caddieai_flutter_spike"
    // KAN-270 retest 2026-04-11: bumped 35 → 36 because
    // flutter_plugin_android_lifecycle (transitive from
    // mapbox_maps_flutter 2.21.1) now requires compileSdk 36.
    // Was 35 for the original spike on mapbox_maps_flutter 2.12.0.
    compileSdk = 36
    // mapbox_maps_flutter + flutter_plugin_android_lifecycle both request 26.1.
    ndkVersion = "26.1.10909125"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.caddieai.spike.caddieai_flutter_spike"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        // mapbox_maps_flutter 2.x requires minSdk 21+. Bumping to 24 to match
        // the main CaddieAI Android app.
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
