AWSTemplateFormatVersion: '2010-09-09'
Description: CaddieAI Telemetry Ingestion - API Gateway + Lambda + S3 (console-deployable)

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]
  ApiKeyValue:
    Type: String
    Description: API key the iOS app sends in x-api-key header. Must be at least 20 characters.
    NoEcho: true
    MinLength: 20

Resources:

  # ── S3 Bucket ──────────────────────────────────────────────────────
  TelemetryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub caddieai-telemetry-${Environment}
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldData
            Status: Enabled
            ExpirationInDays: 365
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── Lambda IAM Role ────────────────────────────────────────────────
  IngestFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub caddieai-telemetry-lambda-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3WriteOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub ${TelemetryBucket.Arn}/*

  # ── Lambda Function (inline code) ─────────────────────────────────
  IngestFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub caddieai-telemetry-ingest-${Environment}
      Runtime: python3.12
      Handler: index.handler
      Timeout: 10
      MemorySize: 128
      Role: !GetAtt IngestFunctionRole.Arn
      Environment:
        Variables:
          BUCKET_NAME: !Ref TelemetryBucket
      Code:
        ZipFile: |
          import json, os, uuid, boto3
          from datetime import datetime, timezone

          s3 = boto3.client("s3")
          BUCKET = os.environ["BUCKET_NAME"]
          VALID_TYPES = {"llm_call","golf_api_call","weather_call","mapbox_call","course_played"}

          def handler(event, context):
              body_str = event.get("body", "")
              if not body_str:
                  return resp(400, {"error": "Empty request body"})
              if len(body_str) > 65536:
                  return resp(400, {"error": "Request body too large"})
              try:
                  body = json.loads(body_str)
              except json.JSONDecodeError:
                  return resp(400, {"error": "Invalid JSON"})

              device_id = body.get("deviceId")
              if not device_id or not isinstance(device_id, str):
                  return resp(400, {"error": "Missing or invalid deviceId"})

              events = body.get("events")
              if not events or not isinstance(events, list):
                  return resp(400, {"error": "Missing or invalid events array"})
              if len(events) > 100:
                  return resp(400, {"error": "Too many events (max 100)"})

              for i, e in enumerate(events):
                  if not isinstance(e, dict) or e.get("type") not in VALID_TYPES:
                      return resp(400, {"error": f"Event {i} has invalid type"})

              now = datetime.now(timezone.utc)
              key = f"events/{now:%Y/%m/%d}/{device_id}_{uuid.uuid4().hex[:12]}.json"
              record = {
                  "deviceId": device_id,
                  "receivedAt": now.isoformat(),
                  "eventCount": len(events),
                  "events": events,
              }
              s3.put_object(Bucket=BUCKET, Key=key, Body=json.dumps(record), ContentType="application/json")
              return resp(200, {"accepted": len(events)})

          def resp(code, body):
              return {"statusCode": code, "headers": {"Content-Type": "application/json"}, "body": json.dumps(body)}

  # ── API Gateway (REST) ─────────────────────────────────────────────
  TelemetryApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub caddieai-telemetry-${Environment}
      Description: Telemetry ingestion endpoint for CaddieAI

  # /events resource
  EventsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TelemetryApi
      ParentId: !GetAtt TelemetryApi.RootResourceId
      PathPart: events

  # POST /events method (requires API key)
  EventsPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TelemetryApi
      ResourceId: !Ref EventsResource
      HttpMethod: POST
      ApiKeyRequired: true
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations
          - FunctionArn: !GetAtt IngestFunction.Arn

  # Permission for API Gateway to invoke Lambda
  IngestFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IngestFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TelemetryApi}/*/POST/events

  # Deploy the API
  TelemetryApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: EventsPostMethod
    Properties:
      RestApiId: !Ref TelemetryApi

  TelemetryApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref TelemetryApi
      DeploymentId: !Ref TelemetryApiDeployment
      StageName: !Ref Environment
      MethodSettings:
        - HttpMethod: '*'
          ResourcePath: '/*'
          ThrottlingBurstLimit: 20
          ThrottlingRateLimit: 10

  # ── API Key + Usage Plan ───────────────────────────────────────────
  TelemetryApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: TelemetryApiStage
    Properties:
      Name: !Sub caddieai-app-key-${Environment}
      Enabled: true
      Value: !Ref ApiKeyValue
      StageKeys:
        - RestApiId: !Ref TelemetryApi
          StageName: !Ref Environment

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: TelemetryApiStage
    Properties:
      UsagePlanName: !Sub caddieai-telemetry-plan-${Environment}
      Throttle:
        BurstLimit: 20
        RateLimit: 10
      Quota:
        Limit: 10000
        Period: DAY
      ApiStages:
        - ApiId: !Ref TelemetryApi
          Stage: !Ref Environment

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref TelemetryApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  EndpointUrl:
    Description: POST telemetry events to this URL
    Value: !Sub https://${TelemetryApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/events

  BucketName:
    Description: S3 bucket where telemetry data is stored
    Value: !Ref TelemetryBucket

  ApiKeyId:
    Description: API Key ID (retrieve value from API Gateway > API Keys in console)
    Value: !Ref TelemetryApiKey
